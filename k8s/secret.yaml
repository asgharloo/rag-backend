apiVersion: v1
kind: Secret

metadata:
  name: rag-secret

type: Opaque

stringData:
  DATABASE_URL: "postgresql+asyncpg://postgres:PASSWORD@pstg.xxxxx.eu-north-1.rds.amazonaws.com:5432/postgres"

  REDIS_URL: "redis://localhost:6379/0"

  SECRET_KEY: "your-secret-key-here-change-in-production"

  ALGORITHM: "HS256"

  ACCESS_TOKEN_EXPIRE_MINUTES: "1440"

  OPENAI_API_KEY: "YOUR_NEW_OPENAI_KEY"

  MODEL_NAME: "gpt-4o"

  BASE_URL: "https://api.gapgpt.app/v1"

  SUMMARY_INTERVAL: "3"

  SUMMARY_MAX_WORDS: "300"

  MEMORY_SEARCH_LIMIT: "3"

  MEMORY_DISTANCE_THRESHOLD: "0.40"

  CHAT_HISTORY_LIMIT: "20"
