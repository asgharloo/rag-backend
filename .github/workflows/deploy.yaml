name: Deploy RAG Backend

on:
  push:
    branches:
      - main

jobs:

  build-and-deploy:

    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4


    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: eu-north-1


    - name: Login to Amazon ECR
      uses: aws-actions/amazon-ecr-login@v2


    - name: Build Docker image
      run: |
        docker build \
         -t rag-app:${{ github.sha }} .


    - name: Push image to ECR
      run: |

        IMAGE=348389439074.dkr.ecr.eu-north-1.amazonaws.com/rag-app:${{ github.sha }}

        docker tag rag-app:${{ github.sha }} $IMAGE

        docker push $IMAGE


    - name: Deploy to EKS
      run: |

        aws eks update-kubeconfig \
        --name rag-cluster \
        --region eu-north-1

        kubectl set image deployment/rag-backend \
        rag-backend=348389439074.dkr.ecr.eu-north-1.amazonaws.com/rag-app:${{ github.sha }}
        kubectl rollout status deployment/rag-backend --timeout=180s

    - name: Rollback on failure
      if: failure()
      run: |
          echo "Deployment failed. Rolling back..."

          kubectl rollout undo deployment/rag-backend

          kubectl rollout status deployment/rag-backend --timeout=180s
